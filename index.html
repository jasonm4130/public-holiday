<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D2137" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8F4EE" media="(prefers-color-scheme: light)" />
    <script>
      (function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}})();
    </script>
    <meta
      name="description"
      content="Find your next public holiday and optimize your leave for maximum time off. Supports 100+ countries worldwide."
    />
    <meta property="og:title" content="My Next Public Holiday" />
    <meta property="og:description" content="Find your next public holiday and optimize your leave for maximum time off. Supports 100+ countries worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Your Next Public Holiday</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
